<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nail Biting Detected</title>
  <style>
    body {
      margin:0;
      height:100vh;
      background:#000;
      color:#fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      display:grid;
      place-items:center;
      text-align:center;
    }
    .box { max-width: 860px; padding: 32px; }
    h1 { font-size: 48px; margin: 0; letter-spacing: 0.5px; }
    p { font-size: 20px; opacity: 0.85; margin: 14px 0 0; }
    .row {
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top: 26px;
    }
    button {
      padding: 14px 18px;
      border-radius: 16px;
      border: 0;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }
    .primary { background: #4CAF50; color: #fff; }
    .primary:hover { background: #43A047; }
    .secondary { opacity: 0.9; }
    .hint { margin-top: 14px; font-size: 13px; opacity: 0.55; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Was that nail biting?</h1>
    <p>We noticed your hand near your mouth.</p>

    <div class="row">
      <button class="primary" onclick="resume()">Yes, good catch!</button>
    </div>

    <p style="margin-top: 24px; font-size: 16px; opacity: 0.7;">Not biting? Pause detection:</p>
    <div class="row">
      <button onclick="pause(5)">5 min</button>
      <button onclick="pause(15)">15 min</button>
      <button onclick="pause(60)">60 min</button>
    </div>

    <div class="hint">
      ESC = Pause 5 min
    </div>
  </div>

  <script>
    function pause(minutes) {
      window.app?.pause(minutes);
    }
    function resume() {
      window.app?.resume();
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") pause(5);
    });
  </script>
</body>
</html>
